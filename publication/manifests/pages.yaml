apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: pages
spec:
  title: Pages
  description: |
    Static pages: home, about, contact, privacy, etc. Mirror of the
    posts-vs-pages split in WordPress / Ghost — pages are
    URL-addressable by slug and not part of the chronological feed.

    Slugs are conventional: `home` is the locale's index, `about` /
    `contact` / `privacy` are the canonical secondary pages. The
    starter's worker uses `home` to satisfy `/{locale}/` and
    `pages/{slug}` for everything else; consumers can add or rename
    freely.

    Like posts, pages is the language-neutral parent. Per-locale
    title + body live in `page-translations`.
  schema:
    type: object
    required:
      - slug
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
        description: URL slug. Must match across page-translations.
      authorId:
        type: string
        x-mantle-bind: ctx.user
      publishedAt:
        type: number
        x-mantle-bind: now
  uniqueIndexes:
    - [slug]
  localized: false
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: page-translations
spec:
  title: Page translations
  description: |
    Per-locale companion to `pages`. Carries title, intro (used by the
    home template's hero block), and body markdown. The home page is
    just `slug = "home"` — no special-case schema required.
  schema:
    type: object
    required:
      - slug
      - locale
      - title
      - body
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
      locale:
        type: string
      title:
        type: string
      intro:
        type: string
        description: |
          Optional short tagline rendered at the top of the page. The
          home template uses this as the hero subtitle below the
          site brand.
      body:
        type: string
        description: Markdown body.
  uniqueIndexes:
    - [slug, locale]
  localized: true
  translates:
    parent: pages
    on: slug
  lifecycle: simple
