apiVersion: cms.clam.ai/v1
kind: Schema
metadata:
  name: contact-messages
spec:
  title: Contact messages
  description: |
    Public-submitted contact form. Anonymous-with-email pattern (no
    member system in v0.1.0): visitor supplies name + email + message;
    a Cloudflare Turnstile token rides on the input but is dropped
    from the row by the builtin op's projection — the `before_create`
    lifecycle hook reads it via `ctx.event.originalInput`, calls
    Turnstile siteverify, and aborts the create on failure.
  schema:
    type: object
    required:
      - name
      - email
      - message
    properties:
      name:
        type: string
      email:
        type: string
        format: email
      message:
        type: string
      createdAt:
        type: number
        x-clam-bind: now
  lifecycle: simple
---
apiVersion: cms.clam.ai/v1
kind: Procedure
metadata:
  name: submit-contact
spec:
  input:
    type: object
    required:
      - name
      - email
      - message
      - turnstileToken
    properties:
      name: { type: string }
      email: { type: string, format: email }
      message: { type: string, minLength: 1 }
      turnstileToken:
        type: string
        description: |
          Cloudflare Turnstile token from the widget. Side-channel
          field — declared on the input so the before_create hook
          can read it via ctx.event.originalInput. The builtin op's
          projection drops it from the persisted contact-messages
          row (not in Schema properties).
  output:
    type: object
  handler:
    kind: builtin
    op: create
    schema: contact-messages
---
apiVersion: cms.clam.ai/v1
kind: Procedure
metadata:
  name: captcha-check
spec:
  input:
    type: object
    properties:
      turnstileToken:
        type: string
  output:
    type: object
  handler:
    kind: ref
    ref: captchaCheck
---
apiVersion: cms.clam.ai/v1
kind: Procedure
metadata:
  name: slack-notify
spec:
  input:
    type: object
    properties:
      name: { type: string }
      email: { type: string }
      message: { type: string }
  output:
    type: object
  handler:
    kind: ref
    ref: slackNotify
---
apiVersion: cms.clam.ai/v1
kind: Trigger
metadata:
  name: submit-contact-http
spec:
  source:
    kind: http
    method: POST
    path: /api/contact
  target:
    procedure: submit-contact
---
apiVersion: cms.clam.ai/v1
kind: Trigger
metadata:
  name: 010-contact-captcha-guard
spec:
  source:
    kind: lifecycle
    schema: contact-messages
    on: [before_create]
    errorPolicy: abort
  target:
    procedure: captcha-check
---
apiVersion: cms.clam.ai/v1
kind: Trigger
metadata:
  name: 020-contact-slack-notify
spec:
  source:
    kind: lifecycle
    schema: contact-messages
    on: [after_create]
  target:
    procedure: slack-notify
