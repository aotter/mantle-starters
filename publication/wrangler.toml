name = "mantle-publication"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Cloudflare Turnstile site key (public — embedded in the contact
# form widget). Default is CF's "always passes" test key — good for
# `pnpm dev` + CI. Production: provision your own at
# dash.cloudflare.com/?to=/:account/turnstile and replace.
# https://developers.cloudflare.com/turnstile/troubleshooting/testing/
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

[[d1_databases]]
binding = "DB"
database_name = "mantle-publication-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV"
id = "kv-mantle-publication-local"

# Bundle YAML manifests as inline text strings — TS imports them via
# `?raw` query param, esbuild resolves to a string export at build time.
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true

# ── Test profile ──────────────────────────────────────────────────────
# Activated by `wrangler dev --env test`. Used by integration smoke
# tests (`pnpm test:integration`). Keeps dev (.wrangler/) and test
# (.wrangler-test/) miniflare state separate so a `pnpm dev` browsing
# session never pollutes test fixture data and vice versa.
#
# Bindings are duplicated rather than inherited because wrangler does
# NOT merge env-scoped bindings with the top-level ones (top-level
# bindings disappear once any [env.*] block exists for that resource).
# IDs match the dev profile — same miniflare-simulated D1/KV — but
# state is isolated by `--persist-to .wrangler-test`.
[env.test]

[env.test.vars]
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
# Media uploads enabled in test profile so integration smokes can
# exercise the create/commit lifecycle. Stub credentials — miniflare's
# local R2 emulation accepts the binding ops; real CF deploy needs
# real R2 API tokens via `wrangler secret put`.
MEDIA_PUBLIC_URL_BASE = "http://localhost:8788/__media"
MEDIA_S3_ENDPOINT = "https://test-bucket.example.r2.cloudflarestorage.com"
MEDIA_S3_ACCESS_KEY_ID = "test-access-key"
MEDIA_S3_SECRET_ACCESS_KEY = "test-secret-access-key"

[[env.test.d1_databases]]
binding = "DB"
database_name = "mantle-publication-test"
database_id = "00000000-0000-0000-0000-000000000000"

[[env.test.kv_namespaces]]
binding = "KV"
id = "kv-mantle-publication-test"

# Public media bucket. Reads bypass the Worker; in production the
# bucket should have public access enabled, with `MEDIA_PUBLIC_URL_BASE`
# pointing at a custom domain (or the `pub-<hash>.r2.dev` fallback).
#
# Private media (subscription-gated, fan-club, signed-GET) lands in
# v0.2 as a SEPARATE [[r2_buckets]] block (`MEDIA_PRIVATE` or similar)
# wired to a separate `PrivateMediaStorage` port. Two buckets, two
# ports. See ADR-0011 § "Public vs private media — two buckets, two
# ports".
[[env.test.r2_buckets]]
binding = "MEDIA"
bucket_name = "mantle-publication-media-test"

[[env.test.rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true

[env.test.dev]
port = 8788
