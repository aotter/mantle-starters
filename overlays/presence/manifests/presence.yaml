apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: page
spec:
  title: Pages
  description: Public page content for a presence site.
  schema:
    type: object
    required: [type, title, sections]
    properties:
      type:
        type: string
        enum: [home]
      title:
        type: string
      summary:
        type: string
      sections:
        type: array
        minItems: 1
        items:
          type: object
          required: [type, title]
          properties:
            type:
              type: string
              enum:
                - hero
                - socialProof
                - content
                - features
                - bento
                - metrics
                - testimonials
                - faq
                - contact
                - contactForm
                - cta
            id:
              type: string
            eyebrow:
              type: string
            title:
              type: string
            body:
              type: string
              x-mcp-hint: markdown
            action:
              type: object
              properties:
                label:
                  type: string
                href:
                  type: string
            secondaryAction:
              type: object
              properties:
                label:
                  type: string
                href:
                  type: string
            footerTitle:
              type: string
            footerBody:
              type: string
              x-mcp-hint: markdown
            footerAction:
              type: object
              properties:
                label:
                  type: string
                href:
                  type: string
            items:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  body:
                    type: string
                    x-mcp-hint: markdown
                  label:
                    type: string
                  href:
                    type: string
                  value:
                    type: string
                  icon:
                    type: string
                  quote:
                    type: string
                  name:
                    type: string
                  role:
                    type: string
                  company:
                    type: string
                  mark:
                    type: number
            fields:
              type: array
              items:
                type: object
                required: [name, label]
                properties:
                  name:
                    type: string
                  label:
                    type: string
                  type:
                    type: string
                  placeholder:
                    type: string
                  autocomplete:
                    type: string
                  required:
                    type: boolean
                  multiline:
                    type: boolean
  uniqueIndexes:
    - [type]
  localized: false
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: View
metadata:
  name: home
spec:
  from: page
  fields: [id, type, title, summary, sections, updatedAt]
  filter:
    eq: { field: status, value: published }
  limit: 1
---
apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: contact
spec:
  title: Contact messages
  description: Visitor contact messages submitted from the public presence page.
  schema:
    type: object
    required: [name, email, message]
    properties:
      name:
        type: string
      email:
        type: string
        format: email
      message:
        type: string
      createdAt:
        type: number
        x-mantle-bind: now
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: Procedure
metadata:
  name: send-contact-message
spec:
  input:
    type: object
    required: [name, email, message]
    properties:
      name:
        type: string
      email:
        type: string
        format: email
      message:
        type: string
        minLength: 1
      "cf-turnstile-response":
        type: string
      turnstileToken:
        type: string
  output:
    type: object
  handler:
    kind: builtin
    op: create
    schema: contact
---
apiVersion: cms.mantle.aotter.net/v1
kind: Trigger
metadata:
  name: contact-http
spec:
  source:
    kind: http
    method: POST
    path: /api/contact
  target:
    procedure: send-contact-message
---
apiVersion: cms.mantle.aotter.net/v1
kind: Procedure
metadata:
  name: verify-contact-turnstile
spec:
  input:
    type: object
    properties:
      "cf-turnstile-response":
        type: string
      turnstileToken:
        type: string
  output:
    type: object
  handler:
    kind: ref
    ref: verify-contact-turnstile
---
apiVersion: cms.mantle.aotter.net/v1
kind: Trigger
metadata:
  name: contact-before-create-verify-turnstile
spec:
  source:
    kind: lifecycle
    schema: contact
    on: [before_create]
    errorPolicy: abort
  target:
    procedure: verify-contact-turnstile
---
apiVersion: cms.mantle.aotter.net/v1
kind: Procedure
metadata:
  name: notify-contact
spec:
  input:
    type: object
    properties:
      name:
        type: string
      email:
        type: string
      message:
        type: string
  output:
    type: object
  handler:
    kind: ref
    ref: notify-contact
---
apiVersion: cms.mantle.aotter.net/v1
kind: Trigger
metadata:
  name: contact-notify
spec:
  source:
    kind: lifecycle
    schema: contact
    on: [after_create]
    errorPolicy: continue
  target:
    procedure: notify-contact
