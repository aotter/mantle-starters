apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: page
spec:
  title: Pages
  description: Public page content for a publication site.
  schema:
    type: object
    required: [type, title, sections]
    properties:
      type:
        type: string
        enum: [home]
      title:
        type: string
      summary:
        type: string
      sections:
        type: array
        minItems: 1
        items:
          type: object
          required: [type, title]
          properties:
            type:
              type: string
              enum:
                - hero
                - content
                - features
                - bento
                - faq
                - cta
            id:
              type: string
            eyebrow:
              type: string
            title:
              type: string
            body:
              type: string
              x-mcp-hint: markdown
            action:
              type: object
              properties:
                label: { type: string }
                href: { type: string }
            secondaryAction:
              type: object
              properties:
                label: { type: string }
                href: { type: string }
            items:
              type: array
              items:
                type: object
                properties:
                  title: { type: string }
                  body:
                    type: string
                    x-mcp-hint: markdown
                  icon: { type: string }
  uniqueIndexes:
    - [type]
  localized: false
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: View
metadata:
  name: home
spec:
  from: page
  fields: [id, type, title, summary, sections, updatedAt]
  filter:
    eq: { field: status, value: published }
  limit: 1
---
apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: posts
spec:
  title: Posts
  description: Publication posts for the first public content surface.
  schema:
    type: object
    required: [slug, title]
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
      title:
        type: string
      excerpt:
        type: string
      body:
        type: string
        x-mcp-hint: markdown
      publishedAt:
        type: number
  uniqueIndexes:
    - [slug]
  localized: false
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: View
metadata:
  name: published-posts
spec:
  from: posts
  fields: [id, slug, title, excerpt, body, publishedAt, updatedAt]
  filter:
    eq: { field: status, value: published }
  orderBy:
    - { field: publishedAt, direction: desc }
    - { field: updatedAt, direction: desc }
  limit: 50
---
apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: post-suggestions
spec:
  title: Post suggestions
  description: Lightweight reader suggestions for future publication work.
  schema:
    type: object
    required: [title, email]
    properties:
      title:
        type: string
      email:
        type: string
        format: email
      note:
        type: string
      createdAt:
        type: number
        x-mantle-bind: now
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: Procedure
metadata:
  name: submit-post-suggestion
spec:
  input:
    type: object
    required: [title, email]
    properties:
      title: { type: string }
      email: { type: string, format: email }
      note: { type: string }
  output:
    type: object
  handler:
    kind: builtin
    op: create
    schema: post-suggestions
---
apiVersion: cms.mantle.aotter.net/v1
kind: Trigger
metadata:
  name: submit-post-suggestion-http
spec:
  source:
    kind: http
    method: POST
    path: /api/post-suggestions
  target:
    procedure: submit-post-suggestion
