apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: posts
spec:
  title: Posts
  description: |
    Language-neutral parent table for blog posts. Holds the slug, cover
    asset id, author, and publish timestamp. Per-locale title + body
    live in the `post-translations` Schema (translates -> posts on
    slug). Slug is the natural key joining the two.
  schema:
    type: object
    required:
      - slug
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
        description: URL slug. Must match across post-translations.
      coverAssetId:
        type: string
        x-mantle-ref: media_assets
        x-mcp-hint: media-image
        description: |
          MediaAsset.id of the cover image (aotter/mantle#272). The
          agent calls `create_media_upload` with `purpose: "post-cover"`
          + a three-variant manifest (avif/webp/jpeg), PUTs every
          variant directly to R2 via the returned presigned URLs,
          then `commit_media_upload`. The committed asset's `id`
          goes here. Renderers materialise the variants set via
          `runtime.media.resolve(coverAssetId)` and emit `<picture>`.
          Helper CLI: `@aotter/mantle-media-tools`.
      authorId:
        type: string
        x-mantle-bind: ctx.user
        description: Server-stamped from the staff user creating the post.
      publishedAt:
        type: number
        x-mantle-bind: now
        description: Server-stamped at create time.
  uniqueIndexes:
    - [slug]
  localized: false
  lifecycle: simple
