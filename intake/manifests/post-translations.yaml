apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: post-translations
spec:
  title: Post translations
  description: |
    Per-locale companion to `posts`. One row per (slug, locale). Carries
    title and body markdown; everything language-neutral (slug, cover,
    author, publish time) lives on the parent.

    ADR-0010 i18n pattern: the public render path joins this Schema to
    its parent on `slug`, falls back to canonical locale when the
    requested locale is missing.
  schema:
    type: object
    required:
      - slug
      - locale
      - title
      - body
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
      locale:
        type: string
        description: BCP 47 locale tag, must be in site `locales`.
      title:
        type: string
      body:
        type: string
        description: Markdown body.
  uniqueIndexes:
    - [slug, locale]
  localized: true
  translates:
    parent: posts
    on: slug
  lifecycle: simple
---
apiVersion: cms.mantle.aotter.net/v1
kind: View
metadata:
  name: recent-posts
spec:
  from: post-translations
  fields: [slug, locale, title, updatedAt]
  filter:
    eq: { field: status, value: published }
  orderBy:
    - { field: updatedAt, direction: desc }
  limit: 20
---
apiVersion: cms.mantle.aotter.net/v1
kind: View
metadata:
  name: posts-by-locale
spec:
  from: post-translations
  fields: [slug, locale, title]
  params:
    type: object
    properties:
      locale:
        type: string
        description: BCP 47 locale tag. Pulled from the public REST query string at request time.
    required: [locale]
  filter:
    and:
      - eq: { field: status, value: published }
      - eq: { field: locale, value: { $param: locale } }
  orderBy:
    - { field: slug, direction: asc }
  limit: 100
