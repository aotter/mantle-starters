apiVersion: cms.mantle.aotter.net/v1
kind: Schema
metadata:
  name: posts
spec:
  title: Posts
  description: |
    Language-neutral parent table for blog posts. Holds the slug, cover
    image URL, author, and publish timestamp. Per-locale title + body
    live in the `post-translations` Schema (translates -> posts on
    slug). Slug is the natural key joining the two.
  schema:
    type: object
    required:
      - slug
    properties:
      slug:
        type: string
        pattern: "^[a-z0-9-]+$"
        description: URL slug. Must match across post-translations.
      coverUrl:
        type: string
        format: uri
        x-mcp-hint: media-image
        description: |
          Public URL of the cover image. v0.1.0: hand-supplied URL only
          (consumer hosts the asset elsewhere — Imgur, S3, CDN, etc.).
          v0.1.x may add explicit opt-in first-party media hosting
          (R2 on Cloudflare) + a UI picker; this field stays a string
          URL so existing posts keep working.
      authorId:
        type: string
        x-mantle-bind: ctx.user
        description: Server-stamped from the staff user creating the post.
      publishedAt:
        type: number
        x-mantle-bind: now
        description: Server-stamped at create time.
  uniqueIndexes:
    - [slug]
  localized: false
  lifecycle: simple
