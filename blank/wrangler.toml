name = "mantle-blank"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "mantle-blank-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV"
id = "kv-mantle-blank-local"

# Bundle YAML manifests as inline text strings.
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true
