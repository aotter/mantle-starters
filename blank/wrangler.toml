name = "clam-blank"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "clam-blank-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV"
id = "kv-clam-blank-local"

# OAuth grant store for @cloudflare/workers-oauth-provider — client
# registrations + grants + tokens for the MCP surfaces (/mcp + /mcp/staff).
# Provision with `wrangler kv namespace create OAUTH_KV` and replace
# the id below before deploy.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "kv-clam-blank-oauth-local"

# Bundle YAML manifests as inline text strings.
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true
