name = "clam-blank"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "clam-blank-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV"
id = "kv-clam-blank-local"

# OAuth provider storage — clients / grants / tokens issued by
# @cloudflare/workers-oauth-provider. Separate namespace from KV.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "oauth-kv-clam-blank-local"

# Bundle YAML manifests as inline text strings.
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true
