name: Bug report
description: Report broken, surprising, or unsafe behavior in a starter or provision bundle.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets or vulnerability details here; use Security Advisories for security reports.
        Engine / runtime bugs (in `@aotter/mantle-*`) belong on the parent repo: https://github.com/aotter/mantle/issues/new/choose
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the install command, archetype intent, terminal output, and a minimal repro if possible.
      placeholder: |
        1. Mantle landing provisioned a new repo
        2. Selected: archetype=publication
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - starter:blank
        - overlay:publication
        - overlay:transaction
        - overlay:community
        - overlay:reservation
        - area:provision-bundle
        - area:kiwa
        - area:sources-json
        - area:ci
        - area:docs
        - unknown
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Logs or diagnostics
      description: Paste structured diagnostics, stack traces, launch state JSON, or command output.
      render: text
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Starters ref, Node version, pnpm version, platform.
      placeholder: |
        starters ref:
        node:
        pnpm:
        platform:
    validations:
      required: true
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: This may involve unfilled `{{MACRO}}` substitution.
        - label: This may involve trust boundaries (`.dev.vars`, OAuth secrets, Turnstile keys).
        - label: I checked existing issues.
