name: New overlay request
description: Propose a new post-launch type overlay.
title: "[Overlay] "
labels: ["enhancement", "status:roadmap"]
body:
  - type: markdown
    attributes:
      value: |
        First launch always uses `blank/`. New type-specific work should start as a small post-launch overlay.
  - type: input
    id: name
    attributes:
      label: Proposed overlay name (kebab-case)
      placeholder: "e.g. commerce-marketplace"
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: What does it add?
      description: 3–5 sentences. What 4-atoms manifest, seed prompt, or route/layout hint does this overlay add?
    validations:
      required: true
  - type: textarea
    id: contrast
    attributes:
      label: Why isn't an existing archetype enough?
      description: How does this differ from publication / transaction / reservation / community?
    validations:
      required: true
  - type: textarea
    id: prior-art
    attributes:
      label: Prior art / references
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: I checked existing overlays under `overlays/`.
        - label: This may need parent `mantle` engine changes (note them above).
