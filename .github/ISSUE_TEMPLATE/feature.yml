name: Feature request
description: Request a concrete new capability for the blank base, overlays, Kiwa source, or the scaffolder.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent job is blocked? (For a new launch type, use the "New overlay" template instead.)
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the blank base, overlay, Kiwa source, or scaffolder do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - starter:blank
        - overlay:publication
        - overlay:transaction
        - overlay:reservation
        - overlay:community
        - area:scaffolder
        - area:kiwa
        - area:sources-json
        - area:ci
        - area:docs
        - unknown
    validations:
      required: true
  - type: textarea
    id: agent_dx
    attributes:
      label: AI-author DX
      description: How does this make agent-scaffolded projects safer or clearer?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: This is not converged and needs `needs-discussion`.
        - label: This depends on a change in the parent `mantle` engine.
