# Dependabot config for mantle-starters.
#
# Shared third-party versions live in the root pnpm catalog. Dependabot
# must run from the workspace root so it can resolve `catalog:` entries;
# per-starter update jobs rewrite package.json files without the root
# catalog context and leave CI with stale workspace lockfiles.
#
# `@aotter/*` is excluded: SDK bumps land via the mantle release
# pipeline + a deliberate `pnpm up @aotter/*` in each starter,
# never via dependabot patch/minor PRs.
#
# Lockfile note: dependabot can update catalog/package metadata without
# regenerating every pnpm-lock.yaml this repo uses. The
# dependabot-lockfile.yml workflow runs `pnpm install` on the PR branch
# and pushes the lockfile fix back, so CI can pass and
# dependabot-automerge can fire for patch/minor.
#
# Cooldown (added alpha.15): each ecosystem skips releases newer than
# 14 days (21 for majors). Supply-chain buffer — a malicious release
# that lands at npm and is yanked within ~2 weeks never enters our
# pipeline. Emergency CVE inside the window goes through manual
# `pnpm up <pkg>` or a one-off PR; cooldown is for steady-state churn.

version: 2
updates:
  # ── pnpm workspace catalog ──────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
      semver-major-days: 21
    labels:
      - area:dependencies
      - dependencies
    ignore:
      - dependency-name: "@aotter/*"
    groups:
      types:
        patterns: ["@types/*"]
      cloudflare:
        patterns: ["wrangler", "@cloudflare/*"]
      build-tooling:
        patterns: ["typescript", "tsx", "vitest"]
        update-types: ["minor", "patch"]
      runtime-libs:
        patterns: ["aws4fetch", "better-auth", "hono", "marked", "yaml", "zod"]
        update-types: ["minor", "patch"]
      sharp:
        patterns: ["sharp"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
    labels:
      - area:ci
      - dependencies
    groups:
      actions:
        patterns: ["*"]
