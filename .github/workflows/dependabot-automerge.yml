# Auto-merge dependabot PRs after CI passes — but only for patch /
# minor / digest update types. Major bumps stay manual because the
# breaking-change surface is too wide to merge unattended.
#
# Sequencing: `dependabot-lockfile.yml` commits the lockfile fix
# first (which retriggers `validate.yml`). Once validate.yml passes,
# this workflow's `gh pr merge --auto` queues the merge.

name: dependabot-automerge

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch + minor + digest
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-digest'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--merge` (not --squash) because this repo's GitHub settings
        # disable squash. Match what PR #60 / #88 / #112 were merged with.
        run: gh pr merge --auto --merge "$PR_URL"
