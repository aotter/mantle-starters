# Auto-merge dependabot PRs after CI passes — but only for patch /
# minor / digest update types. Major bumps stay manual because the
# breaking-change surface is too wide to merge unattended.
#
# Sequencing: `dependabot-lockfile.yml` commits the lockfile fix
# first (which retriggers `validate.yml`). Once validate.yml passes,
# this workflow's `gh pr merge --auto` queues the merge.

name: dependabot-automerge

on:
  pull_request:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Approve the PR first — develop branch protection requires 1
      # approving review, dependabot can't self-approve, so without
      # this the auto-merge queue stays BLOCKED forever. Repo Settings
      # → Actions → "Allow GitHub Actions to create and approve PRs"
      # must be on (it is; flipped 2026-05-17). Only approves patch /
      # minor / digest — same gate as the merge step below.
      - name: Auto-approve patch + minor + digest
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-digest'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Auto-merge patch + minor + digest
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-digest'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Rebase merge: keeps develop linear and preserves dependabot's
        # `chore(deps): bump X` subject as the head commit. Squash is
        # disabled on this repo; merge-commit is allowed but produces
        # 'Merge pull request #N from ...' subjects that would collide
        # with the release-fanout filter on tag-and-dispatch-landing.yml.
        run: gh pr merge --auto --rebase "$PR_URL"
