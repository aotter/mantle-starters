name: validate

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  starters:
    name: starter ${{ matrix.starter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        starter: [blank]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.starter }}/pnpm-lock.yaml

      - name: Install
        working-directory: ${{ matrix.starter }}
        run: pnpm install --frozen-lockfile

      - name: Validate manifests
        working-directory: ${{ matrix.starter }}
        run: pnpm validate

      - name: Typecheck
        working-directory: ${{ matrix.starter }}
        run: pnpm typecheck

  starter-locks:
    name: starter lockfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check standalone starter lockfiles
        run: pnpm check:starter-locks

      - name: Check provision bundle is current
        run: pnpm check:provision-bundle

      - name: Smoke provision bundle
        run: pnpm smoke:provision-bundle

      - name: Check Kiwa vendor source is current
        run: pnpm check:kiwa

  starter-safety:
    name: starter safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Assert starter safety checks
        run: |
          node scripts/check-wrangler-dev-wrapper.mjs
          node scripts/check-repo-local-skills.mjs
