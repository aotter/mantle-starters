# Release fanout — between Step 2 and Step 3 of AotterClam/mantle#191.
#
# Triggered when a `release: bump @aotterclam/mantle* to vX.Y.Z` commit
# lands on main (a develop→main promotion that brings the
# bump-from-sdk.yml release commit forward). Tags the head commit
# `vX.Y.Z` and dispatches `mantle-landing`'s `bump-from-starters.yml`
# workflow so the landing site rolls forward to the same version.
#
# Filter uses `contains(...)` not `startsWith(...)` because the
# develop→main merge is done with `gh pr merge --merge`, whose default
# commit subject is `Merge pull request #N from owner/develop` with
# the PR title (which we always start with `release: ...`) in the
# body. `contains` matches body text too; `startsWith` would silently
# skip the run and leave the release un-tagged.
#
# Why split from bump-from-sdk.yml: that workflow opens a PR and
# returns. The PR's auto-merge fires asynchronously, so the tag +
# downstream dispatch can't live in the same job. Listening for the
# merge commit on main is the simplest pivot point.

name: tag-and-dispatch-landing

on:
  push:
    branches: [main]

permissions:
  contents: write   # for `git tag` + `git push`

jobs:
  tag:
    if: contains(github.event.head_commit.message, 'release: bump @aotterclam/mantle* to v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_FANOUT_TOKEN }}

      - name: Extract version from commit message
        id: ver
        run: |
          set -euo pipefail
          # Commit message shape: somewhere inside is `release: bump
          # @aotterclam/mantle* to vX.Y.Z`. Grep extracts the version
          # token from anywhere in the message, not just the first
          # line, so a merge-commit body works the same as a rebase
          # commit's first line.
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oE 'release: bump @aotterclam/mantle\* to v[0-9][^[:space:]]+' | head -n1 | grep -oE 'v[0-9][^[:space:]]+' | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            echo "::error::Couldn't extract version from commit message: $MSG"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected release version: v$VERSION"

      - name: Create + push tag
        run: |
          set -euo pipefail
          git config user.name 'mantle-release-bot'
          git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Dispatch landing bump-from-starters
        env:
          GH_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::RELEASE_FANOUT_TOKEN not set — landing bump skipped. Starters is tagged; set the secret and re-dispatch manually via the Actions UI in mantle-landing."
            exit 0
          fi
          gh api repos/AotterClam/mantle-landing/dispatches \
            -f event_type=starters-released \
            -F "client_payload[starters_version]=${{ steps.ver.outputs.version }}"
          echo "Dispatched mantle-landing bump-from-starters for v${{ steps.ver.outputs.version }}"
