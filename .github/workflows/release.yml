name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-and-attach:
    name: publish scaffolder + attach tarball to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/create-mantle/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version + infer npm tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          case "$VERSION" in
            *-alpha*) NPM_TAG=alpha ;;
            *-beta*)  NPM_TAG=beta ;;
            *-rc*)    NPM_TAG=rc ;;
            *)        NPM_TAG=latest ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version $VERSION -> npm dist-tag $NPM_TAG"

      - name: Install scaffolder deps
        working-directory: packages/create-mantle
        run: pnpm install --frozen-lockfile

      - name: Verify package version matches ${{ steps.ver.outputs.version }}
        working-directory: packages/create-mantle
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
            const expected = '${{ steps.ver.outputs.version }}';
            if (pkg.version !== expected) {
              console.error('packages/create-mantle/package.json version ' + pkg.version + ' does not match tag version ' + expected);
              process.exit(1);
            }
          "

      - name: Build scaffolder
        working-directory: packages/create-mantle
        run: pnpm build

      - name: Pack tarball
        working-directory: packages/create-mantle
        run: pnpm pack

      - name: Publish scaffolder to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TARBALL=$(ls packages/create-mantle/aotter-create-mantle-*.tgz | head -n 1)
          PUBLISH_TAG="${{ steps.ver.outputs.npm_tag }}"
          if [[ "$VERSION" == 0.0.* && "$PUBLISH_TAG" != "latest" ]]; then
            PUBLISH_TAG=latest
          fi
          if npm view "@aotter/create-mantle@$VERSION" version >/dev/null 2>&1; then
            echo "@aotter/create-mantle@$VERSION already exists on npm; skipping publish"
          else
            npm publish "$TARBALL" \
              --tag "$PUBLISH_TAG" \
              --access public
          fi
          if [[ "$PUBLISH_TAG" != "${{ steps.ver.outputs.npm_tag }}" ]]; then
            npm dist-tag add "@aotter/create-mantle@$VERSION" "${{ steps.ver.outputs.npm_tag }}"
          fi

      - name: Verify npm metadata
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          for attempt in 1 2 3 4 5 6 7 8; do
            npm view "@aotter/create-mantle@$VERSION" version readmeFilename --json && \
              README_LEN=$((npm view "@aotter/create-mantle@$VERSION" readme --json 2>/dev/null || true) | node -e "let s=''; process.stdin.on('data',d=>s+=d); process.stdin.on('end',()=>{const v=s.trim()?JSON.parse(s):''; console.log((v || '').length);})") && \
              [ "$README_LEN" -ge 200 ] && exit 0
            echo "npm metadata not ready yet (attempt $attempt); retrying"
            sleep 15
          done
          echo "::error::@aotter/create-mantle@$VERSION npm readme stayed empty"
          exit 1

      - name: Stage release assets
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          TARBALL=$(ls packages/create-mantle/aotter-create-mantle-*.tgz | head -n 1)
          if [ -z "$TARBALL" ]; then
            echo "::error::pnpm pack did not produce a tarball"
            exit 1
          fi
          # Versioned + 'latest' aliases. The 'latest' alias powers:
          # npx https://github.com/aotter/mantle-starters/releases/latest/download/aotter-create-mantle.tgz
          mkdir -p out
          cp "$TARBALL" "out/aotter-create-mantle-${VER}.tgz"
          cp "$TARBALL" "out/aotter-create-mantle.tgz"
          (cd out && sha256sum aotter-create-mantle-${VER}.tgz > aotter-create-mantle-${VER}.tgz.sha256)
          (cd out && sha256sum aotter-create-mantle.tgz > aotter-create-mantle.tgz.sha256)
          ls -la out/

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" out/* --clobber
