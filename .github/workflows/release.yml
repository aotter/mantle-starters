name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-attach:
    name: build private packages + attach to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Extract version from tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version $VERSION"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Verify packed-package versions match ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const expected = '${{ steps.ver.outputs.version }}';
            const pkgs = [
              'packages/mantle-media-tools/package.json',
            ];
            for (const path of pkgs) {
              const pkg = JSON.parse(readFileSync(path, 'utf8'));
              if (pkg.version !== expected) {
                console.error(path + ' version ' + pkg.version + ' does not match tag version ' + expected);
                process.exit(1);
              }
            }
          "

      - name: Build mantle-media-tools
        working-directory: packages/mantle-media-tools
        run: pnpm build

      - name: Pack mantle-media-tools tarball
        working-directory: packages/mantle-media-tools
        run: pnpm pack

      - name: Stage release assets
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p out

          # mantle-media-tools (#272)
          MEDIA_TOOLS_TARBALL=$(ls packages/mantle-media-tools/aotter-mantle-media-tools-*.tgz | head -n 1)
          if [ -z "$MEDIA_TOOLS_TARBALL" ]; then
            echo "::error::pnpm pack did not produce the mantle-media-tools tarball"
            exit 1
          fi
          cp "$MEDIA_TOOLS_TARBALL" "out/aotter-mantle-media-tools-${VER}.tgz"
          cp "$MEDIA_TOOLS_TARBALL" "out/aotter-mantle-media-tools.tgz"
          (cd out && sha256sum aotter-mantle-media-tools-${VER}.tgz > aotter-mantle-media-tools-${VER}.tgz.sha256)
          (cd out && sha256sum aotter-mantle-media-tools.tgz > aotter-mantle-media-tools.tgz.sha256)

          # Versioned + unversioned aliases under the same tag. Do not
          # document `/releases/latest/` while releases are alpha-only:
          # GitHub latest ignores prereleases and returns 404 until a
          # stable release exists.
          ls -la out/

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            CREATE_FLAGS=()
            case "$TAG" in
              *-alpha*|*-beta*|*-rc*) CREATE_FLAGS+=(--prerelease) ;;
            esac
            gh release create "$TAG" --title "$TAG" --generate-notes "${CREATE_FLAGS[@]}"
          fi
          gh release upload "$TAG" out/* --clobber
