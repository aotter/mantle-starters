name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-attach:
    name: build scaffolder tarball + attach to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/create-mantle/pnpm-lock.yaml

      - name: Extract version from tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG -> version $VERSION"

      - name: Install scaffolder deps
        working-directory: packages/create-mantle
        run: pnpm install --frozen-lockfile

      - name: Verify package version matches ${{ steps.ver.outputs.version }}
        working-directory: packages/create-mantle
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
            const expected = '${{ steps.ver.outputs.version }}';
            if (pkg.version !== expected) {
              console.error('packages/create-mantle/package.json version ' + pkg.version + ' does not match tag version ' + expected);
              process.exit(1);
            }
          "

      - name: Build scaffolder
        working-directory: packages/create-mantle
        run: pnpm build

      - name: Pack tarball
        working-directory: packages/create-mantle
        run: pnpm pack

      - name: Stage release assets
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          TARBALL=$(ls packages/create-mantle/aotterclam-create-mantle-*.tgz | head -n 1)
          if [ -z "$TARBALL" ]; then
            echo "::error::pnpm pack did not produce a tarball"
            exit 1
          fi
          # Versioned + 'latest' aliases. The 'latest' alias powers:
          # npx https://github.com/AotterClam/mantle-starters/releases/latest/download/aotterclam-create-mantle.tgz
          mkdir -p out
          cp "$TARBALL" "out/aotterclam-create-mantle-${VER}.tgz"
          cp "$TARBALL" "out/aotterclam-create-mantle.tgz"
          (cd out && sha256sum aotterclam-create-mantle-${VER}.tgz > aotterclam-create-mantle-${VER}.tgz.sha256)
          (cd out && sha256sum aotterclam-create-mantle.tgz > aotterclam-create-mantle.tgz.sha256)
          ls -la out/

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" out/* --clobber
