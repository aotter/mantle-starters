# Release fanout — Step 2 of aotter/mantle#191.
#
# Triggered by mantle SDK's `release.yml` after a successful publish.
# Bumps blank starter `@aotter/mantle*` deps + own version to the
# just-published SDK version, gates on validate + typecheck for blank,
# opens a PR against main
# with auto-merge enabled. repository_dispatch runs on the default
# branch (`develop`), so this PR also promotes the current develop
# starter content into the release. After the PR merges, this workflow
# waits for `tag-and-dispatch-landing.yml` to create the tag from the
# main push; if GitHub suppresses that follow-on workflow for an
# Actions-originated merge, this workflow creates the tag and dispatches
# `mantle-landing` directly as a fallback. Finally, it syncs the release
# bump commit from `main` back to `develop` so the next SDK fanout does
# not start from stale starter package / lock metadata.
#
# Operator setup (one-time):
#
#   RELEASE_FANOUT_TOKEN — fine-grained PAT (or GitHub App token)
#                          with `contents: write` + `pull-requests:
#                          write` on this repo (for opening + auto-
#                          merging the PR) and on `mantle-landing`
#                          (for the dispatch after merge). Required.

name: bump-from-sdk

on:
  repository_dispatch:
    types: [sdk-published]

  # Manual override — useful if RELEASE_FANOUT_TOKEN was missing during
  # the SDK publish or if a previous bump PR was closed without merge.
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'SDK version to bump to (without leading v)'
        required: true
        type: string
      npm_tag:
        description: 'npm dist-tag (alpha / beta / rc / latest)'
        required: true
        type: string
        default: alpha

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - id: input
        run: |
          set -euo pipefail
          VERSION="${{ github.event.client_payload.sdk_version || inputs.sdk_version }}"
          NPM_TAG="${{ github.event.client_payload.npm_tag || inputs.npm_tag }}"
          if [ -z "$VERSION" ]; then
            echo "::error::sdk_version not supplied"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping starters to SDK version $VERSION (npm dist-tag $NPM_TAG)"

      - uses: actions/checkout@v6.0.3
        with:
          token: ${{ secrets.RELEASE_FANOUT_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Assert develop contains released main
        run: |
          set -euo pipefail
          git fetch origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/develop:refs/remotes/origin/develop' \
            --tags
          MAIN_SHA=$(git rev-parse origin/main)
          if git merge-base --is-ancestor "$MAIN_SHA" origin/develop; then
            echo "origin/develop contains released main ($MAIN_SHA)."
            exit 0
          fi
          echo "::error::origin/develop does not contain current origin/main ($MAIN_SHA). The previous release backport did not land; sync main back to develop before starting another fanout."
          exit 1

      - name: Create release branch
        run: |
          set -euo pipefail
          BRANCH="release/v${{ steps.input.outputs.version }}"
          git checkout -B "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_ENV"

      - name: Bump @aotter/mantle* deps + own version
        env:
          VERSION: ${{ steps.input.outputs.version }}
        run: |
          set -euo pipefail
          # Per generated base (and root): rewrite every "@aotter/mantle*" dep
          # to the new version, and bump the package's own `version`.
          # Touches both `dependencies` and `devDependencies`.
          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'node:fs';
            import { globSync } from 'node:fs';
            const paths = [
              'package.json',
              'blank/package.json',
            ];
            const version = process.env.VERSION;
            for (const p of paths) {
              const j = JSON.parse(readFileSync(p, 'utf8'));
              for (const k of ['dependencies', 'devDependencies']) {
                if (!j[k]) continue;
                for (const dep of Object.keys(j[k])) {
                  if (dep === '@aotter/mantle' || dep.startsWith('@aotter/mantle-')) {
                    j[k][dep] = version;
                  }
                }
              }
              // Own version mirrors SDK version per #191.
              j.version = version;
              writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
              console.log('bumped', p);
            }
          "

      - name: Regenerate workspace lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate standalone starter lockfiles
        run: pnpm refresh:starter-locks

      - name: Validate (gate)
        run: |
          set -euo pipefail
          for starter in blank; do
            echo "=== validate $starter ==="
            (cd "$starter" && pnpm validate)
            echo "=== typecheck $starter ==="
            (cd "$starter" && pnpm typecheck)
          done

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name 'mantle-release-bot'
          git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "::error::No changes after bump — was the SDK version the same as current?"
            exit 1
          fi
          git commit -m "release: bump @aotter/mantle* to v${{ steps.input.outputs.version }}"
          git push origin "${{ env.branch }}"

      - name: Open release PR
        id: openpr
        env:
          # PR creation uses RELEASE_FANOUT_TOKEN because it's a PAT
          # with cross-repo `pull-requests: write` — needed for the
          # commit + push and the cross-repo dispatch later.
          GH_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ env.branch }}" \
            --title "release: bump @aotter/mantle* to v${{ steps.input.outputs.version }}" \
            --body "Auto-generated by \`bump-from-sdk.yml\` after SDK release \`v${{ steps.input.outputs.version }}\` (dist-tag \`${{ steps.input.outputs.npm_tag }}\`). Workspace + standalone blank lockfiles were regenerated, and validate + typecheck passed for blank before this PR opened. Auto-merge enabled into \`main\`; merging this PR tags starters and dispatches landing.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Opened PR: $PR_URL"

      - name: Approve release PR
        env:
          # GITHUB_TOKEN approves as github-actions[bot] — different
          # actor from the PAT that opened the PR, so GitHub doesn't
          # reject this as a self-approval. Requires repo Settings →
          # Actions → "Allow GitHub Actions to create and approve PRs".
          # Without this split (single PAT for both create + approve),
          # the approve step fails with
          # `Review Can not approve your own pull request`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.openpr.outputs.pr_url }}
        run: |
          set -euo pipefail
          gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        env:
          # Use RELEASE_FANOUT_TOKEN for the merge action. Merges
          # performed solely with GITHUB_TOKEN do not reliably trigger
          # follow-on push workflows; alpha.16 skipped
          # tag-and-dispatch-landing that way.
          GH_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
          PR_URL: ${{ steps.openpr.outputs.pr_url }}
        run: |
          set -euo pipefail
          # Rebase merge: keeps the PR's commit subject `release: bump
          # @aotter/mantle* to vX.Y.Z` as the head commit on
          # main, which `tag-and-dispatch-landing.yml` detects before
          # tagging starters and dispatching the landing bump.
          gh pr merge --auto --rebase "$PR_URL"
          echo "Auto-merge queued: $PR_URL"

      - name: Wait for merge + complete fanout
        env:
          GH_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
          PR_URL: ${{ steps.openpr.outputs.pr_url }}
          VERSION: ${{ steps.input.outputs.version }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 90); do
            MERGED_AT=$(gh pr view "$PR_URL" --json mergedAt --jq '.mergedAt // ""')
            if [ -n "$MERGED_AT" ]; then
              MERGE_SHA=$(gh pr view "$PR_URL" --json mergeCommit --jq '.mergeCommit.oid // ""')
              if [ -z "$MERGE_SHA" ]; then
                echo "::error::Release PR is merged but mergeCommit.oid is empty."
                exit 1
              fi
              echo "Release PR merged at $MERGED_AT ($MERGE_SHA)"
              break
            fi
            echo "Release PR not merged yet; waiting (attempt $attempt/90)."
            sleep 10
          done

          if [ -z "${MERGE_SHA:-}" ]; then
            echo "::error::Release PR did not merge before timeout."
            exit 1
          fi

          # Give tag-and-dispatch-landing.yml a chance to handle the
          # normal main-push path. If that workflow is suppressed by
          # GitHub's Actions-token rules, no tag appears and this step
          # completes the fanout itself.
          for attempt in $(seq 1 12); do
            git fetch origin "refs/tags/v$VERSION:refs/tags/v$VERSION" >/dev/null 2>&1 || true
            if git rev-parse "v$VERSION" >/dev/null 2>&1; then
              echo "Tag v$VERSION already exists; downstream tag workflow handled the release."
              exit 0
            fi
            echo "Tag v$VERSION not visible yet; waiting for downstream tag workflow (attempt $attempt/12)."
            sleep 10
          done

          git fetch origin main --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists after final fetch; no fallback dispatch needed."
            exit 0
          fi

          echo "Downstream tag workflow did not create v$VERSION; creating tag and dispatching landing."
          git tag "v$VERSION" "$MERGE_SHA"
          git push origin "v$VERSION"
          gh api "repos/${{ github.repository_owner }}/mantle-landing/dispatches" \
            -f event_type=starters-released \
            -F "client_payload[starters_version]=$VERSION"
          echo "Fallback dispatched mantle-landing bump-from-starters for v$VERSION"

      - name: Sync released main back to develop
        env:
          ACTIONS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_FANOUT_TOKEN }}
          VERSION: ${{ steps.input.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name 'mantle-release-bot'
          git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git fetch origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/develop:refs/remotes/origin/develop' \
            --tags

          MAIN_SHA=$(git rev-parse origin/main)
          if git merge-base --is-ancestor "$MAIN_SHA" origin/develop; then
            echo "origin/develop already contains released main ($MAIN_SHA); no backport needed."
            exit 0
          fi

          BRANCH="chore/backport-main-v$VERSION-to-develop"
          git checkout -B "$BRANCH" origin/develop
          git merge --no-ff origin/main -m "chore: backport main v$VERSION to develop"
          git push origin "$BRANCH" --force-with-lease

          PR_URL=$(GH_TOKEN="$RELEASE_TOKEN" gh pr list \
            --base develop \
            --head "$BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // ""')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(GH_TOKEN="$RELEASE_TOKEN" gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "chore: backport main v$VERSION to develop" \
              --body "Auto-generated by \`bump-from-sdk.yml\` after starter release \`v$VERSION\`. This syncs the release bump commit from \`main\` back to \`develop\` so the next SDK fanout starts from current package versions, lockfiles, and provision bundles.")
          fi
          echo "Backport PR: $PR_URL"

          # The PR is opened with RELEASE_FANOUT_TOKEN. Approve with the
          # workflow token so GitHub does not treat it as self-approval.
          GH_TOKEN="$ACTIONS_TOKEN" gh pr review --approve "$PR_URL"
          GH_TOKEN="$RELEASE_TOKEN" gh pr merge --auto --merge --delete-branch "$PR_URL"

          for attempt in $(seq 1 90); do
            MERGED_AT=$(GH_TOKEN="$RELEASE_TOKEN" gh pr view "$PR_URL" --json mergedAt --jq '.mergedAt // ""')
            if [ -n "$MERGED_AT" ]; then
              echo "Backport PR merged at $MERGED_AT"
              exit 0
            fi
            echo "Backport PR not merged yet; waiting (attempt $attempt/90)."
            sleep 10
          done

          echo "::error::Backport PR did not merge before timeout: $PR_URL"
          exit 1
