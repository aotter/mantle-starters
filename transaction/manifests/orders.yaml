apiVersion: cms.clam.ai/v1
kind: Schema
metadata:
  name: orders
spec:
  title: Orders
  description: |
    Source of truth for placed orders. Created by the payment-callback
    consumer after the provider confirms payment; never created by
    visitors directly (carts → reservations → orders).

    `orderStatus` is the **commerce** pipeline (NOT the reserved
    `status` ContentState column — that stays draft / published /
    archived per Entry semantics). Commerce pipeline values:
      placed → fulfilling → shipped → completed
                                  ↘ cancelled (from any state pre-shipped)
                                  ↘ refunded  (manual via provider dashboard)

    `customerEmail` is the buyer's contact (anonymous-with-email — no
    member account in v0.1; see Epic notes). `paymentProvider` +
    `paymentIntentId` are the provider-neutral cross-reference back to
    the payment record (Stripe pi_, ECPay TradeNo, etc.).

    Monetary fields are integer minor units. `totalMinor`,
    `subtotalMinor`, `taxMinor` are stored at write; if recompute is
    needed, derive from `items` array (snapshotted at commit so price
    changes don't rewrite history).
  schema:
    type: object
    required:
      - orderNumber
      - orderStatus
      - currency
      - subtotalMinor
      - taxMinor
      - totalMinor
      - customerEmail
      - paymentProvider
      - paymentIntentId
      - items
    properties:
      orderNumber:
        type: string
        description: Short human-shareable order code (8 chars). Generated at create.
      orderStatus:
        type: string
        enum: [placed, fulfilling, shipped, completed, cancelled, refunded]
      currency:
        type: string
        pattern: "^[A-Z]{3}$"
      subtotalMinor:
        type: integer
        minimum: 0
      taxMinor:
        type: integer
        minimum: 0
      totalMinor:
        type: integer
        minimum: 0
      customerEmail:
        type: string
        format: email
      customerName:
        type: string
        description: Optional — set by the staff or admin UI when known.
      shippingAddress:
        type: object
        description: Free-shape JSON. Populated when the provider returns address data.
      paymentProvider:
        type: string
        description: |
          Provider name ("stripe", "paddle", "ecpay", "payuni",
          "fake", ...). Stable string used for forensics / multi-
          provider dashboards.
      paymentIntentId:
        type: string
        description: |
          Provider's identifier for the payment record itself
          (Stripe payment_intent, ECPay TradeNo). Distinct from the
          callback eventId, which is the webhook-delivery id used
          only for once-and-only-once dedup.
      items:
        type: array
        description: |
          Snapshotted line items at commit time. Each entry freezes
          the price the customer paid so later product price changes
          don't rewrite history. Mirrors the order_items schema for
          adopters that prefer separate-row storage.
        items:
          type: object
          required: [productSlug, qty, priceMinorAtPurchase]
          properties:
            productSlug: { type: string }
            qty: { type: integer, minimum: 1 }
            priceMinorAtPurchase: { type: integer, minimum: 0 }
            title: { type: string }
      placedAt:
        type: number
        x-clam-bind: now
      fulfilledAt:
        type: number
        description: Set by staff at "shipped" transition; null otherwise.
  lifecycle: simple
---
apiVersion: cms.clam.ai/v1
kind: Schema
metadata:
  name: order_items
spec:
  title: Order line items
  description: |
    Line items for an order. One row per product per order.
    Snapshotted at order-creation time — `priceMinorAtPurchase`
    freezes the price the customer paid, so later product price
    changes don't rewrite history.
  schema:
    type: object
    required: [orderNumber, productSlug, qty, priceMinorAtPurchase]
    properties:
      orderNumber:
        type: string
        description: FK to orders.orderNumber.
      productSlug:
        type: string
        description: FK to products.slug at purchase time.
      qty:
        type: integer
        minimum: 1
      priceMinorAtPurchase:
        type: integer
        minimum: 0
      lineTotalMinor:
        type: integer
        minimum: 0
        description: qty * priceMinorAtPurchase, stored for query convenience.
  lifecycle: simple
---
apiVersion: cms.clam.ai/v1
kind: View
metadata:
  name: orders-recent
spec:
  from: orders
  fields:
    - orderNumber
    - orderStatus
    - currency
    - totalMinor
    - customerEmail
    - placedAt
  orderBy:
    - { field: placedAt, direction: desc }
  limit: 100
---
apiVersion: cms.clam.ai/v1
kind: View
metadata:
  name: order-by-number
spec:
  from: orders
  params:
    type: object
    required: [orderNumber]
    properties:
      orderNumber: { type: string }
  filter:
    eq: { field: orderNumber, value: { $param: orderNumber } }
  limit: 1
---
apiVersion: cms.clam.ai/v1
kind: Procedure
metadata:
  name: enqueue-order-confirmed
spec:
  input:
    type: object
    properties:
      orderNumber: { type: string }
  output:
    type: object
  handler:
    kind: ref
    ref: enqueueOrderConfirmed
---
# NOTE: Inactive in v0.1.0 — the `paymentCallbackConsumer` writes the
# order row directly to D1 (INSERT OR IGNORE on a deterministic id, for
# once-and-only-once semantics), which bypasses the runtime's
# createEntry lifecycle. This Trigger lights up for staff-side or
# MCP-driven order creation paths (anything that DOES route through
# `runtime.createEntry.execute()`). The callback consumer enqueues the
# `order.confirmed` message inline; the deduper handles double-fire.
apiVersion: cms.clam.ai/v1
kind: Trigger
metadata:
  name: 010-orders-enqueue-confirmation
spec:
  source:
    kind: lifecycle
    schema: orders
    on: [after_create]
  target:
    procedure: enqueue-order-confirmed
